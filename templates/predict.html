<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Garment Insights AI</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Poppins,sans-serif;
  background:linear-gradient(135deg,#667eea,#764ba2);
  min-height:100vh;
  padding:12px;
  animation:fadeIn 1s ease-in;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

.container{
  max-width:1100px;
  margin:auto;
  background:rgba(255,255,255,.85);
  backdrop-filter:blur(12px);
  padding:22px 28px;
  border-radius:22px;
  box-shadow:0 25px 60px rgba(0,0,0,.25);
  animation:slideUp .9s ease;
}

@keyframes slideUp{
  from{opacity:0;transform:translateY(40px)}
  to{opacity:1;transform:translateY(0)}
}

h1{
  text-align:center;
  font-size:22px;
  font-weight:600;
  margin:10px 0 22px;
  color:#2c3e50;
}

.form-card{
  background:linear-gradient(135deg,#f4f6fb,#eef1f7);
  padding:22px;
  border-radius:18px;
  animation:scaleIn .8s ease;
}

@keyframes scaleIn{
  from{transform:scale(.95);opacity:.5}
  to{transform:scale(1);opacity:1}
}

form{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
}

.field{
  position:relative;
}

.field i{
  position:absolute;
  top:50%;
  left:12px;
  transform:translateY(-50%);
  color:#667eea;
  font-size:14px;
}

label{
  font-size:11px;
  font-weight:600;
  color:#555;
  margin-bottom:4px;
  display:block;
}

input,select{
  width:100%;
  padding:12px 12px 12px 36px;
  border-radius:12px;
  border:1px solid #ccc;
  font-size:13px;
  transition:.35s;
  background:white;
}

input:focus,select:focus{
  outline:none;
  border-color:#667eea;
  box-shadow:0 0 0 4px rgba(102,126,234,.2);
  transform:translateY(-1px);
}

input:hover,select:hover{
  border-color:#764ba2;
}

.submit-area{
  grid-column:span 4;
  text-align:center;
  margin-top:10px;
}

button{
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;
  border:none;
  border-radius:40px;
  padding:14px 48px;
  font-size:15px;
  cursor:pointer;
  box-shadow:0 10px 30px rgba(102,126,234,.5);
  transition:.35s;
}

button:hover{
  transform:translateY(-3px) scale(1.05);
  box-shadow:0 18px 45px rgba(102,126,234,.6);
}

.logout{
  text-align:right;
  margin-bottom:6px;
}

.logout a{
  text-decoration:none;
  background:#f1c40f;
  padding:7px 16px;
  border-radius:20px;
  font-size:13px;
  font-weight:600;
  color:#000;
}

/* ===== RESPONSIVE ===== */
@media(max-width:1024px){
  form{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:768px){
  form{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:480px){
  form{grid-template-columns:1fr}
  h1{font-size:18px}
}
</style>
</head>

<body>

{% include "navbar.html" %}

<div class="container">

<div class="logout">
  <a href="{% url 'logout' %}">
    <i class="fa-solid fa-right-from-bracket"></i> Logout
  </a>
</div>

<h1>
  <i class="fa-solid fa-chart-line"></i>
  Garment Insights AI
</h1>

<div class="form-card">

<form method="post">
{% csrf_token %}

<!-- Garment Weight -->
<div class="field">
    <label>Garment Weight (kg)</label>
    <i class="fa-solid fa-weight-scale"></i>
    <input type="number" step="0.01" name="item_weight" required>
</div>

<!-- Fabric Type -->
<div class="field">
    <label>Fabric Type</label>
    <i class="fa-solid fa-droplet"></i>
    <select name="fabric_type" required>
        <option value="Cotton">Cotton</option>
        <option value="Silk">Silk</option>
        <option value="Polyester">Polyester</option>
        <option value="Wool">Wool</option>
        <option value="Linen">Linen</option>
        <option value="Others">Others</option>
    </select>
</div>

<!-- Garment Category -->
<div class="field">
    <label>Garment Category</label>
    <i class="fa-solid fa-shirt"></i>
    <select name="garment_category" required>
        {% for category,code in item_types.items %}
        <option value="{{ category }}">{{ category }}</option>
        {% endfor %}
    </select>
</div>

<!-- Price -->
<div class="field">
    <label>Garment Retail Price (₹)</label>
    <i class="fa-solid fa-indian-rupee-sign"></i>
    <input type="number" step="0.01" name="price" required>
</div>

<!-- Outlet ID -->
<div class="field">
    <label>Outlet</label>
    <i class="fa-solid fa-store"></i>
    <select name="outlet_id" required>
        {% for i,o in outlet_ids.items %}
        <option value="{{ i }}">{{ o }}</option>
        {% endfor %}
    </select>
</div>

<!-- Establishment Year -->
<div class="field">
    <label>Outlet Establishment Year</label>
    <i class="fa-solid fa-calendar"></i>
    <input type="number" name="outlet_established_year" min="1980" max="2025" required>
</div>

<!-- Outlet Size -->
<div class="field">
    <label>Outlet Size</label>
    <i class="fa-solid fa-arrows-left-right"></i>
    <select name="outlet_size" required>
        <option value="0">Small</option>
        <option value="1">Medium</option>
        <option value="2">Large</option>
    </select>
</div>

<!-- Location Type -->
<div class="field">
    <label>Location Type</label>
    <i class="fa-solid fa-map-location-dot"></i>
    <select name="outlet_location_type" required>
        <option value="0">Metro</option>
        <option value="1">Urban</option>
        <option value="2">Semi-Urban</option>
    </select>
</div>

<!-- Outlet Type -->
<div class="field">
    <label>Outlet Type</label>
    <i class="fa-solid fa-building"></i>
    <select name="outlet_type" required>
        <option value="0">Garment Store</option>
        <option value="1">Apparel Supermarket</option>
        <option value="2">Large Apparel Outlet</option>
        <option value="3">Premium Fashion Store</option>
    </select>
</div>

<!-- Submit -->
<div class="submit-area">
    <button type="submit">
        <i class="fa-solid fa-brain"></i> Predict Sales
    </button>
</div>

</form>


</div>
</div>

</body>
</html>
