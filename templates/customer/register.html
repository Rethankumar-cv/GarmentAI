{% extends "base.html" %}
{% load static %}
{% block title %}Customer Register{% endblock %}
{% block content %}

<style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

    body {
      background-image: url("{% static 'img/digital-art-style-illustration-fashion-designer.jpg' %}");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      
    }
  /* Center the form */
  .register-container {
    max-width: 450px;
    margin: 50px auto;
    background: rgba(255, 255, 255, 0.95);
    padding: 40px 30px;
    border-radius: 25px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    backdrop-filter: blur(10px);
    position: relative;
    overflow: hidden;
    animation: fadeIn 0.8s ease;
  }

  .register-container h2 {
    text-align: center;
    margin-bottom: 20px;
    font-weight: 600;
    color: #333;
    letter-spacing: 1px;
  }

  /* Floating circles in background */
  .register-container::before,
  .register-container::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    background: rgba(102, 126, 234, 0.1);
    z-index: 0;
    animation: float 6s ease-in-out infinite;
  }
  .register-container::before { width: 300px; height: 300px; top: -100px; left: -80px; }
  .register-container::after { width: 200px; height: 200px; bottom: -60px; right: -60px; animation-delay: 3s; }
  @keyframes float {
    0%, 100% { transform: translateY(0) translateX(0); }
    50% { transform: translateY(20px) translateX(20px); }
  }

  form {
    display: flex;
    flex-direction: column;
    gap: 20px;
    position: relative;
    z-index: 1;
  }

  /* Floating labels effect */
  .form-group {
    position: relative;
  }

  .form-group input {
    width: 100%;
    padding: 14px 15px 14px 15px;
    border-radius: 12px;
    border: 1px solid #ccc;
    font-size: 14px;
    transition: all 0.3s ease;
    background: transparent;
  }

  .form-group label {
    position: absolute;
    top: 50%;
    left: 15px;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.95);
    padding: 0 5px;
    color: #999;
    font-size: 14px;
    pointer-events: none;
    transition: all 0.3s ease;
  }

  .form-group input:focus {
    border-color: #667eea;
    box-shadow: 0 0 12px rgba(102,126,234,0.25);
    outline: none;
  }

  .form-group input:focus + label,
  .form-group input:not(:placeholder-shown) + label {
    top: -10px;
    font-size: 12px;
    color: #667eea;
  }

  /* Submit button */
  .btn-primary {
    padding: 14px 0;
    border-radius: 30px;
    border: none;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.35s ease;
    position: relative;
    overflow: hidden;
  }
  .btn-primary::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.25), transparent);
    transform: translateX(-100%);
    transition: transform 0.6s ease;
  }
  .btn-primary:hover::before { transform: translateX(100%); }
  .btn-primary:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 16px 35px rgba(102,126,234,0.5); }
  .btn-primary:active { transform: scale(0.98); }

  /* Login link */
  .login-link {
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
  }
  .login-link a {
    color: #667eea;
    text-decoration: none;
    transition: color 0.3s;
  }
  .login-link a:hover { color: #764ba2; }

  /* Animations */
  @keyframes fadeIn { 0% {opacity:0; transform: scale(0.95);} 100% {opacity:1; transform: scale(1);} }

  /* Responsive */
  @media (max-width: 480px) {
    .register-container { padding: 30px 20px; }
    .btn-primary { font-size: 14px; }
  }

</style>

<div class="register-container">
  <h2>Customer Registration</h2>
  <form method="POST">
    {% csrf_token %}
    <div class="form-group">
      <input type="text" name="username" placeholder=" " required>
      <label>Username</label>
    </div>
    <div class="form-group">
      <input type="email" name="email" placeholder=" " required>
      <label>Email</label>
    </div>
    <div class="form-group">
      <input type="password" name="password" placeholder=" " required>
      <label>Password</label>
    </div>
    <button type="submit" class="btn-primary"><i class="fa-solid fa-user-plus"></i> Register</button>
  </form>
  <p class="login-link">Already have an account? <a href="{% url 'customer_login' %}">Login</a></p>
</div>

{% endblock %}
