{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Garment Insights AI</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* ================= GLOBAL ================= */
body {
    font-family: 'Poppins', sans-serif;
    padding-top: 80px;
    background: #f8f9fa;
}

/* ================= NAVBAR ================= */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 1050;
    background: linear-gradient(135deg, #111, #1f1f1f);
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    animation: slideDown 0.6s ease;
}

/* Slide animation */
@keyframes slideDown {
    from { transform: translateY(-100%); }
    to { transform: translateY(0); }
}

/* ================= BRAND ================= */
.navbar-brand {
    font-weight: 600;
    letter-spacing: 0.6px;
    color: #ffc107 !important;
}

.navbar-brand i {
    margin-right: 6px;
    animation: pulse 2s infinite;
}

/* Brand icon pulse */
@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
}

/* ================= NAV LINKS ================= */
.nav-link {
    color: #ddd !important;
    font-size: 14px;
    padding: 8px 14px;
    margin: 0 4px;
    border-radius: 8px;
    position: relative;
    transition: all 0.3s ease;
}

/* Hover effect */
.nav-link:hover {
    color: #ffc107 !important;
    background: rgba(255,193,7,0.15);
}

/* Underline animation */
.nav-link::after {
    content: "";
    position: absolute;
    left: 15%;
    bottom: 4px;
    width: 0;
    height: 2px;
    background: #ffc107;
    transition: width 0.3s ease;
}

.nav-link:hover::after {
    width: 70%;
}

/* Active link */
.nav-link.active {
    background: #ffc107;
    color: #000 !important;
    font-weight: 600;
    box-shadow: 0 4px 12px rgba(255,193,7,0.5);
}

/* ================= DROPDOWN ================= */
.dropdown-menu {
    background: #1f1f1f;
    border-radius: 10px;
    border: none;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.dropdown-item {
    color: #ddd;
    font-size: 14px;
    transition: all 0.25s ease;
}

.dropdown-item:hover,
.dropdown-item.active {
    background: #ffc107;
    color: #000;
    font-weight: 500;
}

/* ================= LOGOUT ================= */
.nav-link.text-danger {
    color: #ff6b6b !important;
}

.nav-link.text-danger:hover {
    background: rgba(255,107,107,0.2);
}

/* ================= MOBILE ================= */
@media (max-width: 768px) {
    .nav-link {
        margin: 6px 0;
    }
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container-fluid">

<!-- BRAND -->
<a class="navbar-brand" href="{% url 'predict' %}">
    <i class="fa-solid fa-shirt"></i> Garment Insights AI
</a>

<!-- TOGGLER -->
<button class="navbar-toggler" type="button" data-bs-toggle="collapse"
        data-bs-target="#navbarNav">
    <span class="navbar-toggler-icon"></span>
</button>

<!-- MENU -->
<div class="collapse navbar-collapse" id="navbarNav">
<ul class="navbar-nav ms-auto align-items-lg-center">

<li class="nav-item">
    <a class="nav-link" href="{% url 'predict' %}">
        <i class="fa fa-calculator"></i> Demand Prediction
    </a>
</li>

<li class="nav-item">
    <a class="nav-link" href="{% url 'forecast' %}">
        <i class="fa fa-chart-area"></i> Sales Forecast
    </a>
</li>

<li class="nav-item">
    <a class="nav-link" href="{% url 'sales_patterns' %}">
        <i class="fa fa-wave-square"></i> Fabric Sales Patterns
    </a>
</li>

<li class="nav-item">
    <a class="nav-link" href="{% url 'inventory' %}">
        <i class="fa fa-boxes-stacked"></i> Garment Inventory
    </a>
</li>

<li class="nav-item dropdown">
    <a class="nav-link dropdown-toggle" href="#" role="button"
       data-bs-toggle="dropdown">
        <i class="fa fa-brain"></i> AI Decision Support
    </a>
    <ul class="dropdown-menu dropdown-menu-dark">
        <li>
            <a class="dropdown-item" href="{% url 'decision_support' %}">
                Pricing & Fabric Demand
            </a>
        </li>
        <li>
            <a class="dropdown-item" href="{% url 'recommendations' %}">
                Smart Recommendations
            </a>
        </li>
    </ul>
</li>

<li class="nav-item">
    <a class="nav-link" href="{% url 'geo_map' %}">
        <i class="fa fa-map-location-dot"></i> Garment Geo Map
    </a>
</li>

<li class="nav-item">
    <a class="nav-link text-danger" href="{% url 'logout' %}">
        <i class="fa fa-right-from-bracket"></i> Logout
    </a>
</li>

</ul>
</div>
</div>
</nav>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- ACTIVE LINK SCRIPT -->
<script>
const currentPath = window.location.pathname;
document.querySelectorAll(".nav-link").forEach(link => {
    if (link.getAttribute("href") === currentPath) {
        link.classList.add("active");
    }
});
document.querySelectorAll(".dropdown-item").forEach(item => {
    if (item.getAttribute("href") === currentPath) {
        item.classList.add("active");
    }
});
</script>

</body>
</html>
