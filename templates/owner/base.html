<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Boutique Owner{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            padding-top: 80px;
            background: #f6f7fb;
        }

        /* ================= NAVBAR ================= */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1050;
            background: linear-gradient(135deg, #111, #1f1f1f);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            line-height: 30px;
        }

        /* Brand */
        .navbar-brand {
            font-weight: 600;
            color: #ffc107 !important;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Links */
        .nav-link {
            color: #ddd !important;
            font-size: 14px;
            padding: 8px 14px;
            border-radius: 8px;
            transition: all 0.3s ease;
            position: relative;
            margin-left: 30px;
        }

        .nav-link:hover {
            color: #ffc107 !important;
            background: rgba(255,193,7,0.15);
        }

        .nav-link.active {
            background: #ffc107;
            color: #000 !important;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(255,193,7,0.5);
        }

        /* Logout */
        .nav-link.text-danger {
            color: #ff6b6b !important;
        }

        .nav-link.text-danger:hover {
            background: rgba(255,107,107,0.2);
        }

        /* Content */
        .content {
            padding: 30px;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .nav-link {
                margin: 6px 0;
            }
        }
    </style>
</head>

<body>

<!-- ================= OWNER NAVBAR ================= -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid px-4">

        <!-- BRAND -->
        <a class="navbar-brand" href="{% url 'owner_dashboard' %}">
            <i class="fa-solid fa-store"></i> {{ boutique.name }}
        </a>

        <!-- TOGGLER -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#ownerNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- MENU -->
        <div class="collapse navbar-collapse" id="ownerNav">
            <ul class="navbar-nav me-auto align-items-lg-center">

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'owner_dashboard' %}">
                        <i class="fa fa-chart-line"></i> Dashboard
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'owner_products' %}">
                        <i class="fa fa-shirt"></i> Products
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'owner_customers' %}">
                        <i class="fa fa-users"></i> Customers
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'owner_inventory' %}">
                        <i class="fa fa-boxes-stacked"></i> Inventory
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'owner_predictions' %}">
                        <i class="fa fa-brain"></i> Predictions
                    </a>
                </li>
            </ul>

            <!-- RIGHT -->
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link text-danger" href="{% url 'logout' %}">
                        <i class="fa fa-right-from-bracket"></i> Logout
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- ================= PAGE CONTENT ================= -->
<div class="content container-fluid">
    {% block content %}{% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- ACTIVE LINK -->
<script>
    const currentPath = window.location.pathname;
    document.querySelectorAll(".nav-link").forEach(link => {
        if (link.getAttribute("href") === currentPath) {
            link.classList.add("active");
        }
    });
</script>

</body>
</html>
