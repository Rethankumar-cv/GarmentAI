{% extends "owner/base.html" %}
{% load static %}
{% block content %}
<h4>🧠 Sales Forecast</h4>

<table class="table table-bordered bg-white">
<tr>
  <th>Month</th>
  <th>Predicted Sales</th>
</tr>
{% for f in forecast %}
<tr>
  <td>{{ f.month }}</td>
  <td>{{ f.sales }}</td>
</tr>
{% endfor %}
</table>
{% endblock %}
